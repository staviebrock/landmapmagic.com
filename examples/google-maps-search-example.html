<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>LandMapMagic - Search Example</title>

    <style>
        html,
        body,
        #map {
            height: 100%;
            margin: 0;
            padding: 0;
            font-family: sans-serif;
        }

        #search-container {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            z-index: 1000;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(8px);
            padding: 8px;
            border-radius: 8px;
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.18);
            display: flex;
            gap: 8px;
            width: 440px;
            align-items: center;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
        }

        #search-input {
            flex: 1;
            padding: 10px 14px;
            font-size: 14px;
            font-weight: 500;
            border: 1px solid #e4e4e7;
            border-radius: 6px;
            outline: none;
            color: #18181b;
            background: white;
            font-family: inherit;
        }

        #search-input:focus {
            border-color: #6366f1;
            box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.1);
        }

        #search-results {
            position: absolute;
            top: calc(100% + 6px);
            left: 0;
            right: 0;
            background: white;
            border: 1px solid #e4e4e7;
            border-radius: 8px;
            max-height: 400px;
            overflow-y: auto;
            display: none;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.14);
        }

        .result-item {
            padding: 10px 12px;
            cursor: pointer;
            border-bottom: 1px solid #f4f4f5;
            display: flex;
            align-items: flex-start;
            gap: 10px;
            transition: background 0.1s;
        }

        .result-item:last-child {
            border-bottom: none;
        }

        .result-item:hover {
            background-color: #f8f8f8;
        }

        .result-icon {
            flex-shrink: 0;
            width: 30px;
            height: 30px;
            border-radius: 6px;
            display: flex;
            align-items: center;
            justify-content: center;
            margin-top: 1px;
        }

        .result-body {
            flex: 1;
            min-width: 0;
        }

        .result-name {
            font-weight: 600;
            font-size: 14px;
            color: #18181b;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .result-meta {
            font-size: 12px;
            color: #71717a;
            margin-top: 2px;
            display: flex;
            align-items: center;
            gap: 6px;
            flex-wrap: wrap;
        }

        .result-type {
            display: inline-block;
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 1px 6px;
            border-radius: 3px;
            flex-shrink: 0;
        }

        .result-details {
            font-size: 11px;
            color: #a1a1aa;
            margin-top: 3px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        /* Type colors */
        .type-parcel        { background: #fef3c7; color: #92400e; }
        .type-address       { background: #dbeafe; color: #1e40af; }
        .type-state         { background: #f5f3ff; color: #6d28d9; }
        .type-county        { background: #eff6ff; color: #1d4ed8; }
        .type-plss_township { background: #ecfdf5; color: #065f46; }
        .type-plss_section  { background: #fffbeb; color: #92400e; }

        /* Selected result info panel */
        #result-panel {
            position: absolute;
            bottom: 40px;
            right: 20px;
            z-index: 1000;
            background: rgba(255, 255, 255, 0.97);
            backdrop-filter: blur(8px);
            border-radius: 10px;
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            padding: 16px;
            width: 300px;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "Helvetica Neue", Arial, sans-serif;
            display: none;
        }

        #result-panel .panel-header {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-bottom: 12px;
        }

        #result-panel .panel-title {
            font-size: 14px;
            font-weight: 700;
            color: #18181b;
            flex: 1;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #result-panel .panel-close {
            cursor: pointer;
            font-size: 18px;
            color: #a1a1aa;
            line-height: 1;
            flex-shrink: 0;
        }

        #result-panel .panel-close:hover {
            color: #18181b;
        }

        #result-panel .panel-badge {
            font-size: 10px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            padding: 2px 8px;
            border-radius: 4px;
            flex-shrink: 0;
        }

        #result-panel .panel-row {
            display: flex;
            justify-content: space-between;
            font-size: 12px;
            padding: 5px 0;
            border-bottom: 1px solid #f4f4f5;
            gap: 8px;
        }

        #result-panel .panel-row:last-child {
            border-bottom: none;
        }

        #result-panel .panel-label {
            color: #71717a;
            font-weight: 500;
            flex-shrink: 0;
        }

        #result-panel .panel-value {
            color: #18181b;
            font-weight: 600;
            text-align: right;
            min-width: 0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        #legend {
            position: absolute;
            bottom: 20px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            font-size: 12px;
        }

        /* Loading Spinner */
        .spinner {
            border: 3px solid #f3f3f3;
            border-radius: 50%;
            border-top: 3px solid #3498db;
            width: 20px;
            height: 20px;
            -webkit-animation: spin 1s linear infinite;
            /* Safari */
            animation: spin 1s linear infinite;
            display: none;
            /* Hidden by default */
        }

        /* Safari */
        @-webkit-keyframes spin {
            0% {
                -webkit-transform: rotate(0deg);
            }

            100% {
                -webkit-transform: rotate(360deg);
            }
        }

        @keyframes spin {
            0% {
                transform: rotate(0deg);
            }

            100% {
                transform: rotate(360deg);
            }
        }

        #controls {
            position: absolute;
            top: 80px;
            left: 20px;
            background: white;
            padding: 10px;
            border-radius: 4px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
            font-size: 14px;
        }
    </style>

    <!-- deck.gl dependencies for Google Maps integration -->
    <script src="https://unpkg.com/deck.gl@^9.0.0/dist.min.js"></script>
    <script src="https://unpkg.com/@deck.gl/google-maps@^9.0.0/dist.min.js"></script>
</head>

<body>
    <div id="search-container">
        <input type="text" id="search-input" placeholder="Search places, addresses, parcel IDs..." />
        <div class="spinner" id="search-spinner"></div>
        <div id="search-results"></div>
    </div>

    <div id="controls">
        <label style="display: flex; align-items: center; cursor: pointer;">
            <input type="checkbox" id="show-parcel-labels" checked style="margin-right: 8px;">
            Show Parcel Labels
        </label>
    </div>

    <div id="map"></div>
    <div id="result-panel">
        <div class="panel-header">
            <span class="panel-badge" id="panel-badge"></span>
            <span class="panel-title" id="panel-title"></span>
            <span class="panel-close" id="panel-close">×</span>
        </div>
        <div id="panel-rows"></div>
    </div>
    <div id="legend">
        <div><strong>Layers (Zoom Dependent)</strong></div>
        <div>States (z0-6)</div>
        <div>Counties (z6-10)</div>
        <div>Townships (z10-12)</div>
        <div>Sections (z12-14)</div>
        <div>Parcels (z14-17)</div>
        <div>CLU (z14+)</div>
    </div>

    <script>
        /**
         * LandMapMagic Google Maps Integration - Search Example
         */

        // Access deck.gl classes from global namespace
        const { GoogleMapsOverlay } = deck;
        const { MVTLayer } = deck;
        const { TextLayer } = deck;

        // Environment variables injected by Vite
        const GOOGLE_MAPS_KEY = '%VITE_GOOGLE_MAPS_API_KEY%';
        const LANDMAP_KEY = '%VITE_LAND_MAP_MAGIC_API_KEY%';
        const BASE_URL_ENV = '%VITE_LAND_MAP_MAGIC_API_URL%';

        const googleApiKey = (GOOGLE_MAPS_KEY && !GOOGLE_MAPS_KEY.includes('VITE_')) ? GOOGLE_MAPS_KEY : '';
        const landmapApiKey = (LANDMAP_KEY && !LANDMAP_KEY.includes('VITE_')) ? LANDMAP_KEY : 'dev';
        const BASE_URL = (BASE_URL_ENV && !BASE_URL_ENV.includes('VITE_')) ? BASE_URL_ENV : 'https://api.landmapmagic.com';

        if (!googleApiKey) {
            document.body.innerHTML = '<div style="padding:20px;color:red;">Missing VITE_GOOGLE_MAPS_API_KEY in .env.local</div>';
            throw new Error('Missing Google Maps API key');
        }

        // Load Google Maps dynamically
        function loadGoogleMaps() {
            return new Promise((resolve, reject) => {
                if (typeof google !== 'undefined' && google.maps) {
                    resolve();
                    return;
                }

                window.initGoogleMapCallback = resolve;

                const script = document.createElement('script');
                // Include 'places' library for potential future use
                script.src = `https://maps.googleapis.com/maps/api/js?key=${googleApiKey}&callback=initGoogleMapCallback&libraries=places`;
                script.async = true;
                script.defer = true;
                script.onerror = reject;
                document.head.appendChild(script);
            });
        }

        async function initMap() {
            await loadGoogleMaps();

            const map = new google.maps.Map(document.getElementById("map"), {
                center: { lat: 39.8283, lng: -98.5795 },
                zoom: 4,
                mapTypeId: 'satellite',
                mapId: 'DEMO_MAP_ID'
            });

            const overlay = new GoogleMapsOverlay({
                layers: []
            });
            overlay.setMap(map);

            let showParcelLabels = true;

            function updateLayers() {
                const layers = [
                    // States (Zoom 0-6)
                    new MVTLayer({
                        id: 'states',
                        data: `${BASE_URL}/v1/tiles/states/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 0,
                        maxZoom: 6,
                        getFillColor: [0, 0, 0, 0],
                        getLineColor: [253, 224, 71, 230], // #fde047 yellow
                        getLineWidth: 2,
                        lineWidthMinPixels: 2,
                        lineWidthMaxPixels: 4,
                        pickable: true
                    }),
                    // States Labels
                    new MVTLayer({
                        id: 'states-labels',
                        data: `${BASE_URL}/v1/tiles/states/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 0,
                        maxZoom: 6,
                        binary: false,
                        loadOptions: { mvt: { layers: ['states_labels'] } }, // Assuming 'states_labels' exists
                        renderSubLayers: (sublayerProps) => {
                            return new TextLayer({
                                ...sublayerProps,
                                id: `${sublayerProps.id}-text`,
                                data: sublayerProps.data,
                                getPosition: d => d.geometry.coordinates,
                                getText: d => d.properties.NAME || d.properties.name || '',
                                getSize: 13,
                                sizeUnits: 'pixels',
                                getColor: [0, 0, 0, 255], // Black text (matches CLU)
                                fontSettings: { sdf: true, fontSize: 64, buffer: 4 },
                                outlineWidth: 6, // Thicker white outline (matches CLU)
                                outlineColor: [255, 255, 255, 255],
                                pickable: false
                            });
                        }
                    }),

                    // Counties (Zoom 6-10)
                    new MVTLayer({
                        id: 'counties',
                        data: `${BASE_URL}/v1/tiles/counties/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 6,
                        maxZoom: 10,
                        getFillColor: [0, 0, 0, 0],
                        getLineColor: [253, 224, 71, 230],
                        getLineWidth: 2,
                        lineWidthMinPixels: 2,
                        lineWidthMaxPixels: 4,
                        pickable: true
                    }),
                    // Counties Labels
                    new MVTLayer({
                        id: 'counties-labels',
                        data: `${BASE_URL}/v1/tiles/counties/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 6,
                        maxZoom: 10,
                        binary: false,
                        loadOptions: { mvt: { layers: ['counties_labels'] } },
                        renderSubLayers: (sublayerProps) => {
                            return new TextLayer({
                                ...sublayerProps,
                                id: `${sublayerProps.id}-text`,
                                data: sublayerProps.data,
                                getPosition: d => d.geometry.coordinates,
                                getText: d => d.properties.NAME || d.properties.name || '',
                                getSize: 13,
                                sizeUnits: 'pixels',
                                getColor: [255, 255, 255, 255],
                                fontSettings: { sdf: true, fontSize: 64, buffer: 4 },
                                outlineWidth: 4,
                                outlineColor: [0, 0, 0, 255],
                                pickable: false
                            });
                        }
                    }),

                    // Townships (Zoom 10-12)
                    new MVTLayer({
                        id: 'townships',
                        data: `${BASE_URL}/v1/tiles/townships/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 10,
                        maxZoom: 12,
                        getFillColor: [0, 0, 0, 0],
                        getLineColor: [253, 224, 71, 230],
                        getLineWidth: 2,
                        lineWidthMinPixels: 2,
                        lineWidthMaxPixels: 4,
                        pickable: true
                    }),
                    // Townships Labels
                    new MVTLayer({
                        id: 'townships-labels',
                        data: `${BASE_URL}/v1/tiles/townships/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 10,
                        maxZoom: 12,
                        binary: false,
                        loadOptions: { mvt: { layers: ['townships_labels'] } },
                        renderSubLayers: (sublayerProps) => {
                            return new TextLayer({
                                ...sublayerProps,
                                id: `${sublayerProps.id}-text`,
                                data: sublayerProps.data,
                                getPosition: d => d.geometry.coordinates,
                                getText: d => d.properties.friendly_name || d.properties.friendlyName || '',
                                getSize: 13,
                                sizeUnits: 'pixels',
                                getColor: [0, 0, 0, 255],
                                fontSettings: { sdf: true, fontSize: 64, buffer: 4 },
                                outlineWidth: 6,
                                outlineColor: [255, 255, 255, 255],
                                pickable: false
                            });
                        }
                    }),

                    // Sections (Zoom 12-14)
                    new MVTLayer({
                        id: 'sections',
                        data: `${BASE_URL}/v1/tiles/sections/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 12,
                        maxZoom: 14,
                        getFillColor: [0, 0, 0, 0],
                        getLineColor: [253, 224, 71, 230],
                        getLineWidth: 2,
                        lineWidthMinPixels: 2,
                        lineWidthMaxPixels: 4,
                        pickable: true
                    }),
                    // Sections Labels
                    new MVTLayer({
                        id: 'sections-labels',
                        data: `${BASE_URL}/v1/tiles/sections/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 12,
                        maxZoom: 14,
                        binary: false,
                        loadOptions: { mvt: { layers: ['sections_labels'] } },
                        renderSubLayers: (sublayerProps) => {
                            return new TextLayer({
                                ...sublayerProps,
                                id: `${sublayerProps.id}-text`,
                                data: sublayerProps.data,
                                getPosition: d => d.geometry.coordinates,
                                getText: d => d.properties.section_label || d.properties.frstdivlab || d.properties.display_name || '',
                                getSize: 14,
                                sizeUnits: 'pixels',
                                getColor: [255, 255, 255, 255],
                                fontSettings: { sdf: true, fontSize: 64, buffer: 4 },
                                outlineWidth: 4,
                                outlineColor: [0, 0, 0, 255],
                                pickable: false
                            });
                        }
                    }),

                    // Parcels (Zoom 14-17)
                    new MVTLayer({
                        id: 'parcels',
                        data: `${BASE_URL}/v1/tiles/parcels/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 14,
                        maxZoom: 17,
                        binary: false,
                        loadOptions: { mvt: { layers: ['parcels'] } },
                        getFillColor: [0, 0, 0, 0],
                        getLineColor: [255, 165, 0, 200], // Orange for parcels
                        getLineWidth: 1,
                        lineWidthMinPixels: 1,
                        pickable: true,
                        renderSubLayers: (sublayerProps) => {
                            const { data } = sublayerProps;
                            const polygonLayer = new deck.GeoJsonLayer({ ...sublayerProps });

                            if (!showParcelLabels || !data || !data.length) {
                                return [polygonLayer];
                            }

                            const textLayer = new TextLayer({
                                ...sublayerProps,
                                id: `${sublayerProps.id}-text`,
                                data,
                                getPosition: (d) => {
                                    // Centroid approximation
                                    const geometry = d.geometry;
                                    if (geometry.type === 'Polygon') {
                                        const coords = geometry.coordinates[0];
                                        let x = 0, y = 0;
                                        coords.forEach(p => { x += p[0]; y += p[1]; });
                                        return [x / coords.length, y / coords.length];
                                    } else if (geometry.type === 'MultiPolygon') {
                                        const coords = geometry.coordinates[0][0];
                                        let x = 0, y = 0;
                                        coords.forEach(p => { x += p[0]; y += p[1]; });
                                        return [x / coords.length, y / coords.length];
                                    }
                                    return [0, 0];
                                },
                                getText: (d) => {
                                    const props = d.properties || {};
                                    return props.owner || props.owner_name || '';
                                },
                                getSize: 13,
                                sizeUnits: 'pixels',
                                getColor: [0, 0, 0, 255],
                                fontSettings: { sdf: true, fontSize: 64, buffer: 4 },
                                outlineWidth: 4,
                                outlineColor: [255, 255, 255, 255],
                                pickable: false,
                                collisionEnabled: false, // Disabled collision detection as requested
                                // getCollisionPriority: d => d.properties?.acreage_calc || 0
                            });

                            return [polygonLayer, textLayer];
                        }
                    }),

                    // CLU (Zoom 14+)
                    new MVTLayer({
                        id: 'clu',
                        data: `${BASE_URL}/v1/tiles/clu/{z}/{x}/{y}.mvt?key=${landmapApiKey}`,
                        minZoom: 14,
                        maxZoom: 20,
                        getFillColor: [0, 255, 0, 20],
                        getLineColor: [0, 200, 0, 100],
                        getLineWidth: 1,
                        lineWidthMinPixels: 1,
                        pickable: true
                    })
                ];
                overlay.setProps({ layers });
            }

            updateLayers();

            // Toggle Parcel Labels
            const parcelLabelsCheckbox = document.getElementById('show-parcel-labels');
            parcelLabelsCheckbox.addEventListener('change', (e) => {
                showParcelLabels = e.target.checked;
                updateLayers();
            });

            // ─── Search Logic ────────────────────────────────────────────────────────
            const searchInput = document.getElementById('search-input');
            const resultsDiv = document.getElementById('search-results');
            const spinner = document.getElementById('search-spinner');
            const resultPanel = document.getElementById('result-panel');
            const panelTitle = document.getElementById('panel-title');
            const panelBadge = document.getElementById('panel-badge');
            const panelRows = document.getElementById('panel-rows');
            const panelClose = document.getElementById('panel-close');
            let debounceTimer;

            panelClose.addEventListener('click', () => {
                resultPanel.style.display = 'none';
            });

            // Close dropdown when clicking outside
            document.addEventListener('click', (e) => {
                if (!e.target.closest('#search-container')) {
                    resultsDiv.style.display = 'none';
                }
            });

            searchInput.addEventListener('input', (e) => {
                clearTimeout(debounceTimer);
                const query = e.target.value;

                if (query.length < 2) {
                    resultsDiv.style.display = 'none';
                    spinner.style.display = 'none';
                    return;
                }

                debounceTimer = setTimeout(() => performSearch(query), 300);
            });

            async function performSearch(query) {
                spinner.style.display = 'block';
                resultsDiv.style.display = 'none';

                try {
                    let url = `${BASE_URL}/v1/data/search?q=${encodeURIComponent(query)}&limit=10&key=${landmapApiKey}`;

                    // Pass current viewport bbox so the API can infer region(s) for parcel ID lookups
                    const bounds = map.getBounds();
                    if (bounds) {
                        const sw = bounds.getSouthWest();
                        const ne = bounds.getNorthEast();
                        url += `&bbox=${sw.lng().toFixed(6)},${sw.lat().toFixed(6)},${ne.lng().toFixed(6)},${ne.lat().toFixed(6)}`;
                    }

                    const res = await fetch(url);
                    const data = await res.json();
                    displayResults(data.results);
                } catch (err) {
                    console.error('Search failed', err);
                } finally {
                    spinner.style.display = 'none';
                }
            }

            // ─── Type metadata ────────────────────────────────────────────────────────
            const TYPE_META = {
                parcel:        { label: 'Parcel',   color: '#92400e', bg: '#fef3c7', icon: '🏠' },
                address:       { label: 'Address',  color: '#1e40af', bg: '#dbeafe', icon: '📍' },
                state:         { label: 'State',    color: '#6d28d9', bg: '#f5f3ff', icon: '🗺' },
                county:        { label: 'County',   color: '#1d4ed8', bg: '#eff6ff', icon: '📋' },
                plss_township: { label: 'Township', color: '#065f46', bg: '#ecfdf5', icon: '⊞' },
                plss_section:  { label: 'Section',  color: '#92400e', bg: '#fffbeb', icon: '⊟' },
            };

            function getTypeMeta(type) {
                return TYPE_META[type] || { label: type, color: '#6b7280', bg: '#f9fafb', icon: '●' };
            }

            function makeSvgIcon(type) {
                const icons = {
                    address: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#dc2626" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/><circle cx="12" cy="10" r="3"/></svg>`,
                    state: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#7c3aed" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 6l9-4 9 4v14l-9-4-9 4V6z"/><path d="M12 2v18"/></svg>`,
                    county: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#2563eb" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18"/><path d="M9 21V9"/></svg>`,
                    plss_township: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#059669" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>`,
                    plss_section: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#d97706" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="12" y1="3" x2="12" y2="21"/></svg>`,
                    parcel: `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#b45309" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>`,
                };
                return icons[type] || `<svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="#6b7280" stroke-width="2"><circle cx="12" cy="12" r="10"/></svg>`;
            }

            // ─── Build inline detail chips for dropdown rows ──────────────────────────
            function buildDetailChips(result) {
                const chips = [];
                const t = result.type;

                if (t === 'parcel' && result.parcel) {
                    const p = result.parcel;
                    if (p.owner) chips.push(p.owner);
                    if (p.address) chips.push(p.address);
                    if (p.acreage) chips.push(`${parseFloat(p.acreage).toLocaleString()} ac`);
                    if (p.marketValue) chips.push(`$${Number(p.marketValue).toLocaleString()}`);
                } else if (t === 'plss_township' || t === 'plss_section') {
                    if (result.countyName) chips.push(result.countyName);
                    if (result.stateName) chips.push(result.stateName);
                    else if (result.state) chips.push(result.state);
                    if (result.townshipLabel) chips.push(result.townshipLabel);
                    if (t === 'plss_section' && result.plssSection != null) chips.push(`Sec ${result.plssSection}`);
                } else if (t === 'county') {
                    if (result.stateName) chips.push(result.stateName);
                    else if (result.state) chips.push(result.state);
                    if (result.countyFips) chips.push(`FIPS ${result.countyFips}`);
                } else if (t === 'address') {
                    // full_address is already in result.name
                }

                return chips;
            }

            // ─── Render dropdown ─────────────────────────────────────────────────────
            function displayResults(results) {
                resultsDiv.innerHTML = '';
                if (!results || results.length === 0) {
                    resultsDiv.style.display = 'none';
                    return;
                }

                results.forEach(result => {
                    const meta = getTypeMeta(result.type);
                    const chips = buildDetailChips(result);

                    const div = document.createElement('div');
                    div.className = 'result-item';
                    div.innerHTML = `
                        <div class="result-icon" style="background:${meta.bg}">
                            ${makeSvgIcon(result.type)}
                        </div>
                        <div class="result-body">
                            <div class="result-name">${escHtml(result.simpleName)}</div>
                            <div class="result-meta">
                                <span class="result-type type-${result.type}">${meta.label}</span>
                                <span style="overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${escHtml(result.name)}</span>
                            </div>
                            ${chips.length ? `<div class="result-details">${chips.map(escHtml).join(' · ')}</div>` : ''}
                        </div>
                    `;
                    div.addEventListener('click', () => selectResult(result));
                    resultsDiv.appendChild(div);
                });

                resultsDiv.style.display = 'block';
            }

            // ─── Navigate map to result ───────────────────────────────────────────────
            function selectResult(result) {
                if (result.type === 'parcel' && result.parcel) {
                    searchInput.value = `Parcel ${result.simpleName}` + (result.county ? `, ${result.county.name}` : '');
                } else {
                    searchInput.value = result.simpleName;
                }
                resultsDiv.style.display = 'none';

                // Navigate map
                if (result.type === 'parcel' && result.centroid) {
                    map.setCenter({ lat: result.centroid[1], lng: result.centroid[0] });
                    map.setZoom(result.suggestedZoom || 17);
                } else if (result.bbox) {
                    map.fitBounds(new google.maps.LatLngBounds(
                        { lat: result.bbox[1], lng: result.bbox[0] },
                        { lat: result.bbox[3], lng: result.bbox[2] }
                    ));
                } else if (result.centroid) {
                    map.setCenter({ lat: result.centroid[1], lng: result.centroid[0] });
                    map.setZoom(result.suggestedZoom || 12);
                }

                // Show rich info panel
                showResultPanel(result);
            }

            // ─── Rich info panel ──────────────────────────────────────────────────────
            function showResultPanel(result) {
                const meta = getTypeMeta(result.type);
                panelBadge.textContent = meta.label;
                panelBadge.style.background = meta.bg;
                panelBadge.style.color = meta.color;
                panelTitle.textContent = result.simpleName;

                const rows = buildPanelRows(result);
                panelRows.innerHTML = rows.map(([label, value]) => `
                    <div class="panel-row">
                        <span class="panel-label">${escHtml(label)}</span>
                        <span class="panel-value">${escHtml(String(value))}</span>
                    </div>
                `).join('');

                resultPanel.style.display = 'block';
            }

            function buildPanelRows(result) {
                const rows = [];
                const t = result.type;

                if (result.stateName) rows.push(['State', result.stateName]);
                else if (result.state) rows.push(['State', result.state]);

                if (t === 'county') {
                    if (result.countyFips) rows.push(['FIPS', result.countyFips]);
                }

                if (t === 'plss_township') {
                    if (result.countyName) rows.push(['County', result.countyName]);
                    if (result.townshipLabel) rows.push(['Township', result.townshipLabel]);
                    if (result.plssMeridian) rows.push(['Meridian', result.plssMeridian]);
                    if (result.plssTownNum != null) rows.push(['Town #', `${result.plssTownNum}${result.plssTownDir || ''}`]);
                    if (result.plssRangeNum != null) rows.push(['Range #', `${result.plssRangeNum}${result.plssRangeDir || ''}`]);
                }

                if (t === 'plss_section') {
                    if (result.countyName) rows.push(['County', result.countyName]);
                    if (result.townshipLabel) rows.push(['Township', result.townshipLabel]);
                    if (result.plssSection != null) rows.push(['Section', String(result.plssSection)]);
                    if (result.plssMeridian) rows.push(['Meridian', result.plssMeridian]);
                }

                if (t === 'parcel' && result.parcel) {
                    const p = result.parcel;
                    if (result.county) rows.push(['County', result.county.name]);
                    if (result.region) rows.push(['State', result.region]);
                    if (p.owner) rows.push(['Owner', p.owner]);
                    if (p.address) rows.push(['Address', p.address]);
                    if (p.acreage) rows.push(['Acreage (calc)', `${parseFloat(p.acreage).toLocaleString()} ac`]);
                    if (p.acreageDeeded) rows.push(['Acreage (deed)', `${p.acreageDeeded} ac`]);
                    if (p.marketValue) rows.push(['Market Value', `$${Number(p.marketValue).toLocaleString()}`]);
                    if (p.landUseClass) rows.push(['Land Use', p.landUseClass]);
                    if (p.legalDescription) rows.push(['Legal Desc.', p.legalDescription]);
                    if (p.parcelId) rows.push(['Parcel ID', p.parcelId]);
                }

                if (t === 'address') {
                    rows.push(['Full Address', result.name]);
                }

                if (result.suggestedZoom != null) rows.push(['Zoom', String(result.suggestedZoom)]);
                if (result.score != null) rows.push(['Relevance', `${(result.score * 100).toFixed(0)}%`]);

                return rows;
            }

            function escHtml(str) {
                return String(str)
                    .replace(/&/g, '&amp;')
                    .replace(/</g, '&lt;')
                    .replace(/>/g, '&gt;')
                    .replace(/"/g, '&quot;');
            }
        }

        initMap().catch((error) => {
            console.error('Failed to initialize map:', error);
            document.body.innerHTML = `<div style="padding:20px;color:red;">Failed to load map: ${error.message}</div>`;
        });
    </script>
</body>

</html>
